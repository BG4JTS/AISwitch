name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for t in "${targets[@]}"; do
            GOOS="${t%/*}" GOARCH="${t#*/}"
            name="ais-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              name="${name}.exe"
            fi
            echo "→ Building $name"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="-s -w" -o "dist/$name" .
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
